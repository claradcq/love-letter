<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Toi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Lora:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5ead6;
    --cream-dark: #e8d5b7;
    --brown: #7a5230;
    --brown-light: #a0733f;
    --red: #c0392b;
    --ink: #2c1a0e;
    --ink-light: #5a3a1a;
    --gold: #c8961e;
  }

  body {
    background-color: #2a1a0a;
    background-image:
      radial-gradient(ellipse at 20% 20%, #3d2010 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #1a0d05 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'Lora', serif;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.3;
    z-index: 0;
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 1.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Decorative wax seal top */
  .seal {
    width: 70px;
    height: 70px;
    background: radial-gradient(circle at 40% 35%, #e05050, var(--red) 50%, #8b1a1a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,200,200,0.2);
    font-size: 26px;
    animation: sealPulse 3s ease-in-out infinite;
    position: relative;
  }

  .seal::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px dashed rgba(192,57,43,0.4);
  }

  @keyframes sealPulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 0 rgba(192,57,43,0); }
    50% { box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 12px rgba(192,57,43,0); }
  }

  /* The letter */
  .envelope-flap {
    width: min(680px, 100%);
    height: 40px;
    background: linear-gradient(to bottom, var(--cream-dark), var(--cream));
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    margin-bottom: -2px;
  }

  .letter {
    width: min(680px, 100%);
    background: var(--cream);
    background-image:
      linear-gradient(to bottom, transparent 28px, rgba(122,82,48,0.12) 28px, rgba(122,82,48,0.12) 29px, transparent 29px),
      radial-gradient(ellipse at top left, #fdf5e6 0%, var(--cream) 60%);
    background-size: 100% 29px, 100% 100%;
    border-radius: 2px;
    padding: 60px 70px 70px;
    position: relative;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      0 2px 4px rgba(0,0,0,0.2),
      inset 0 0 80px rgba(122,82,48,0.06);
  }

  /* Paper fold lines */
  .letter::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 33.33%;
    height: 1px;
    background: rgba(122,82,48,0.08);
  }

  .letter::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 66.66%;
    height: 1px;
    background: rgba(122,82,48,0.08);
  }

  /* Decorative corner flourishes */
  .corner {
    position: absolute;
    font-size: 28px;
    opacity: 0.18;
    color: var(--brown);
    line-height: 1;
  }
  .corner.tl { top: 16px; left: 18px; transform: rotate(0deg); }
  .corner.tr { top: 16px; right: 18px; transform: rotate(90deg); }
  .corner.bl { bottom: 16px; left: 18px; transform: rotate(-90deg); }
  .corner.br { bottom: 16px; right: 18px; transform: rotate(180deg); }

  .date {
    font-family: 'Lora', serif;
    font-style: italic;
    color: var(--brown-light);
    font-size: 13px;
    text-align: right;
    margin-bottom: 32px;
    letter-spacing: 0.04em;
  }

  .salutation {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--brown);
    margin-bottom: 24px;
    line-height: 1.2;
  }

  .letter-body {
    font-family: 'Lora', serif;
    font-size: 16.5px;
    line-height: 1.95;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 180px;
    transition: color 0.3s;
  }

  .closing {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--brown);
    margin-top: 36px;
    line-height: 1.5;
  }

  .signature {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--ink-light);
    margin-top: 8px;
    letter-spacing: 0.02em;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    opacity: 0.3;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--brown);
  }

  .divider span { color: var(--brown); font-size: 14px; }

  /* Edit button */
  .edit-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(122,82,48,0.12);
    border: 1px solid rgba(122,82,48,0.25);
    color: var(--brown-light);
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Lora', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s;
    z-index: 10;
  }

  .edit-btn:hover {
    background: rgba(122,82,48,0.2);
    border-color: var(--brown-light);
  }

  /* Editor overlay */
  .editor-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,10,2,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .editor-overlay.active { display: flex; }

  .editor-box {
    background: #fdf5e0;
    border-radius: 4px;
    padding: 40px;
    width: min(600px, 100%);
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: slideUp 0.35s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .editor-box h2 {
    font-family: 'Playfair Display', serif;
    color: var(--brown);
    font-style: italic;
    font-size: 22px;
  }

  .editor-box label {
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--brown-light);
    display: block;
    margin-bottom: 4px;
  }

  .editor-box input, .editor-box textarea {
    width: 100%;
    background: white;
    border: 1px solid rgba(122,82,48,0.25);
    border-radius: 3px;
    padding: 10px 14px;
    font-family: 'Lora', serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .editor-box input:focus, .editor-box textarea:focus {
    border-color: var(--brown-light);
  }

  .editor-box textarea {
    min-height: 200px;
    resize: vertical;
    line-height: 1.7;
  }

  .editor-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 10px 22px;
    background: transparent;
    border: 1px solid rgba(122,82,48,0.3);
    color: var(--brown-light);
    border-radius: 3px;
    font-family: 'Lora', serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { background: rgba(122,82,48,0.08); }

  .btn-save {
    padding: 10px 28px;
    background: var(--brown);
    border: none;
    color: var(--cream);
    border-radius: 3px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-save:hover { background: var(--brown-light); }

  /* Floating petals */
  .petal {
    position: fixed;
    font-size: 16px;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Bottom caption */
  .caption {
    color: rgba(200,150,100,0.3);
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-align: center;
  }

  @media (max-width: 600px) {
    .letter { padding: 40px 30px 50px; }
    .salutation { font-size: 22px; }
    .letter-body { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- Floating petals -->
<div class="petal" style="left:8%;animation-duration:12s;animation-delay:0s;font-size:14px;">🌸</div>
<div class="petal" style="left:20%;animation-duration:15s;animation-delay:2s;">🍂</div>
<div class="petal" style="left:40%;animation-duration:10s;animation-delay:5s;font-size:12px;">🌿</div>
<div class="petal" style="left:60%;animation-duration:13s;animation-delay:1s;">🌸</div>
<div class="petal" style="left:75%;animation-duration:11s;animation-delay:7s;font-size:18px;">🍂</div>
<div class="petal" style="left:88%;animation-duration:14s;animation-delay:3s;font-size:12px;">🌸</div>

<div class="scene">
  <div class="seal">♥</div>

  <div style="position:relative; width:min(680px,100%)">
    <button class="edit-btn" onclick="openEditor()">✏️ Modifier la lettre</button>

    <div class="letter" id="letter">
      <div class="corner tl">❧</div>
      <div class="corner tr">❧</div>
      <div class="corner bl">❧</div>
      <div class="corner br">❧</div>

      <div class="date" id="display-date">Le <span id="auto-date"></span></div>

      <div class="salutation" id="display-salutation">Ma chérie,</div>

      <div class="divider"><span>✦</span></div>

      <div class="letter-body" id="display-body">Écris ici ta lettre... Clique sur "Modifier la lettre" pour personnaliser ce message avec tes propres mots.</div>

      <div class="closing" id="display-closing">Avec tout mon amour,</div>
      <div class="signature" id="display-signature">— Ton prénom</div>
    </div>
  </div>

  <div class="caption">Une lettre écrite avec le cœur</div>
</div>

<!-- Editor overlay -->
<div class="editor-overlay" id="editor">
  <div class="editor-box">
    <h2>Écrire ta lettre</h2>

    <div>
      <label>Prénom de ta copine (pour la salutation)</label>
      <input type="text" id="input-salutation" placeholder="ex: Ma chérie, Mon amour, Léa,..." value="Ma chérie,">
    </div>

    <div>
      <label>Le texte de ta lettre</label>
      <textarea id="input-body" placeholder="Écris ta lettre ici...">Écris ici ta lettre... Clique sur "Modifier la lettre" pour personnaliser ce message avec tes propres mots.</textarea>
    </div>

    <div>
      <label>Formule de clôture</label>
      <input type="text" id="input-closing" placeholder="ex: Avec tout mon amour," value="Avec tout mon amour,">
    </div>

    <div>
      <label>Ta signature</label>
      <input type="text" id="input-signature" placeholder="Ton prénom" value="— Ton prénom">
    </div>

    <div class="editor-actions">
      <button class="btn-cancel" onclick="closeEditor()">Annuler</button>
      <button class="btn-save" onclick="saveLetter()">Enregistrer ✦</button>
    </div>
  </div>
</div>

<script>
  // Auto date in French
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const today = new Date();
  document.getElementById('auto-date').textContent = `${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;

  function openEditor() {
    document.getElementById('input-salutation').value = document.getElementById('display-salutation').textContent;
    document.getElementById('input-body').value = document.getElementById('display-body').textContent;
    document.getElementById('input-closing').value = document.getElementById('display-closing').textContent;
    document.getElementById('input-signature').value = document.getElementById('display-signature').textContent;
    document.getElementById('editor').classList.add('active');
  }

  function closeEditor() {
    document.getElementById('editor').classList.remove('active');
  }

  function saveLetter() {
    document.getElementById('display-salutation').textContent = document.getElementById('input-salutation').value;
    document.getElementById('display-body').textContent = document.getElementById('input-body').value;
    document.getElementById('display-closing').textContent = document.getElementById('input-closing').value;
    document.getElementById('display-signature').textContent = document.getElementById('input-signature').value;
    closeEditor();
  }

  // Close on backdrop click
  document.getElementById('editor').addEventListener('click', function(e) {
    if (e.target === this) closeEditor();
  });
</script>
</body>
</html>
